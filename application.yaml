apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yellow-app-gitops
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/walidmns/Yellow-app.git' # <-- METS TON LIEN ICI
    targetRevision: master
    path: .
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true